<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
</head>
<body>
    <div id="sidebar">
        <p>(search bar will be here)</p>
        <li>
            <div class="project-button">
                <button class="sidebar" id="one">Project 1</button>
                <button id="edit">Edit</button>
            </div>
        </li>
        <li><button class="sidebar" id="two">Project 2</button></li>
    </div>

    <div id="project-page">
    </div>

    <div id="note-form-overlay" class="hidden">
        <form id="note-form" autocomplete="off">
            <div class="inner-container">
                <label for="title">Title:</label>
                <input type="text" name="title" id="title" maxlength="65" required><br>
                <label for="dueDate">Deadline:</label>
                <input type="date" name="dueDate" id="dueDate" required><br>
                <label for="priority">Priority:</label>
                <select name="priority" id="priority" required>
                    <option value="" disabled selected hidden>Choose an option</option>
                    <option value="high">High</option>
                    <option value="med">Medium</option>
                    <option value="low">Low</option>
                </select>
                <label for="description">Description:</label>
                <textarea rows="4" cols="40" name="description" id="description" placeholder="Write a description"></textarea>
                
                <button type="submit">Submit</button>
            </div>
        </form>
    </div>

</body>
</html>
